<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>CyberCookie</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./cookie.js"></script>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" name="viewport">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
</head>

<body>
    <script src="./oneko.js"></script>
    <div class="container">
        <center>
            <a href="https://discord.gg/fz2Sr7rBcw" target="_blank">
                <img class="discord-info" id="discord" src="./pictures/discord.png" width="270" height="60"></a>

            <a href="#top"><img id="cookie" class="cookie-button" src="./pictures/cookie.png" width="100"
                    height="100"></a>
            <div id="count">0</div>
            <button class="button" id="shop">Shop</button>
            <div id="shopOptions" style="display: none;">
                <button class="button" id="buy">Autoclicks Lv1</button>
                <div id="autoclickers">0</div>
                <button class="button" id="buyPowerful">Autoclicks Lv2</button>
                <div id="powerfulAutoclickers">0</div>
                <button class="button" id="buySuperPowerful">Autoclicks Lv3</button>
                <div id="superPowerfulAutoclickers">0</div>
                <button class="button" id="buyUltraPowerful">Autoclicks Lv4</button>
                <div id="ultraPowerfulAutoclickers">0</div>
            </div>
            <button class="button" id="theme">theme</button>
            <div id="themeOptions" style="display: none;">
                <button class="button" id="buytheme1">Theme 0 (0.5)</button>
                <button class="button" id="buytheme2">Theme 1 (7K)</button>
                <button class="button" id="buytheme3">Theme 2 (16K)</button>
                <button class="button" id="buytheme4">Theme 3 (120K)</button>
                <button class="button" id="buytheme5">Theme 4 (670K)</button>
                <button class="button" id="buytheme6">Theme 5 (1.3M)</button>
            </div>
            <!-- Confirmation Dialog -->
            <dialog id="confirmationDialog" class="dialog" style="display: none;">
                <p>Confirm Reset ?</p>
                <button class="button" id="confirmYes">Yes</button>
                <center> <button class="button" id="confirmNo">No</button> </center>
            </dialog>
            <button class="button" id="reset">Reset</button>
        </center>
        <a href="./settings.html"><img class="settings" id="settings" src="./pictures/settings.png" width="30" height="30"></a>
        <a href="https://chromewebstore.google.com/detail/cyber-cookie/kbjidhhmcehbnejmdpgfhnaipenoinjb"><img class="extension" id="extension" src="./pictures/fullscreen.png" width="30" height="30"></a>
    </div>
</body>

</html>
